name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04  # Specifying the OS version helps stability

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        # Using the latest master branch version which fixes the chown error
        uses: ArtemSBulgakov/buildozer-action@master 
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable
          # This line below is the key fix for the "chown" error
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zad2048-APK
          path: bin/*.apk
