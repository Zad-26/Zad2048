name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip \
            libffi-dev libssl-dev \
            autoconf libtool pkg-config \
            zlib1g-dev cmake

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-33" \
            "platform-tools" \
            "tools"

      - name: Fix sdkmanager path for buildozer
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            /usr/local/lib/android/sdk/tools/bin/sdkmanager

      - name: Install Python dependencies
        run: |
          pip install --upgrade buildozer cython==0.29.37
          pip install python-for-android==2024.1.21

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          export ANDROIDSDK="/usr/local/lib/android/sdk"
          export ANDROIDNDK="/usr/local/lib/android/sdk/ndk/27.3.13750724"
          export ANDROIDAPI="33"
          export ANDROIDMINAPI="21"
          for i in 1 2 3; do
            yes | buildozer -v android debug 2>&1 && break
            echo "Build attempt $i failed, retrying in 30 seconds..."
            sleep 30
          done

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zad2048-debug
          path: "**/*.apk"
