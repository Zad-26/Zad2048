name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          # Removed libtinfo5 and added libtinfo6 for compatibility with modern Ubuntu
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Fix permissions
        # This ensures the current runner user owns the workspace
        run: sudo chown -R $USER:$USER .

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
        env:
          BUILDOZER_ALLOW_ORG_NAME_AS_PROJECT_NAME: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zad2048-APK
          path: bin/*.apk
